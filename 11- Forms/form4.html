<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>
          <h1>Student Registration Form</h1>
        </legend>
        <div>
          <label for="">FirstName:</label>
          <input type="text" name="" id="" />
        </div>
        <br />
        <div>
          <label for="">LastName:</label>
          <input type="text" name="" id="" />
        </div>
        <br />
        <div>
          <label for="">Gender:</label>
          <input type="radio" name="gender" id="" /> Male
          <input type="radio" name="gender" id="" /> Female
          <input type="radio" name="gender" id="" /> Others
        </div>
        <br />
        <div>
          <label for="">DOB:</label>
          <input type="date" name="" id="" />
          <!-- <input type="datetime-local" name="" id=""> -->
        </div>
        <br />
        <div>
          <label for="">Select Your Skills:</label>
          <input type="checkbox" name="" id="" /> HTML
          <input type="checkbox" name="" id="" /> CSS
          <input type="checkbox" name="" id="" /> JS
          <input type="checkbox" name="" id="" /> SQL
          <input type="checkbox" name="" id="" /> Java
          <input type="checkbox" name="" id="" /> Python
        </div>
        <br />
        <div>
          <label for="">Upload your resume:</label>
          <input type="file" name="" id="" />
        </div>
        <br />
        <div>
          <label for="">Select Slots:</label>
          <input type="number" name="" id="" />
        </div>
        <br />
        <div>
          <input type="checkbox" name="" id="" />
          <label for="">I accept all the Terms and Conditions</label>
        </div>
        <br />
        <div>
          <input type="submit" value="SUBMIT" />
          <input type="reset" />
        </div>
      </fieldset>
    </form>
  </body>
</html>
