<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>
          <h2>Job Application Form</h2>
        </legend>

        <table>
          <tr>
            <td><label for="first">FirstName:</label></td>
            <td><input type="text" name="firstName"  /></td>
          </tr>
          <tr>
            <td><label for="">LastName:</label></td>
            <td><input type="text" name="lastName" id="first" /></td>
          </tr>
          <tr>
            <td><label for="">Email:</label></td>
            <td><input type="email" name="" id="" /></td>
          </tr>
          <tr>
            <td><label for="">Phone:</label></td>
            <td><input type="tel" name="" id="" /></td>
          </tr>
          <tr>
            <td><label for="">DOB:</label></td>
            <td><input type="date" name="" id="" /></td>
          </tr>
          <tr>
            <td><label for="">Gender:</label></td>
            <td>
              <input type="radio" name="gender" id="" /> Male
              <input type="radio" name="gender" id="" /> Female
              <input type="radio" name="gender" id="" /> Others
            </td>
          </tr>
          <tr>
            <td><label for="">Addres:</label></td>
            <td>
              <textarea name="" id=""></textarea>
            </td>
          </tr>
          <tr>
            <td><label for="">City:</label></td>
            <td>
              <input
                type="text"
                placeholder="Type or Search your city"
                list="cities"
              />
              <datalist id="cities">
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
                <option value=""></option>
              </datalist>
            </td>
          </tr>
          <tr>
            <td><button>Submit</button></td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
