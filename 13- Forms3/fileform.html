<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>File Validations in HTML</h1>
    <form action="">
      <div>
        <label for="">Upload Resume:</label>
        <input type="file" accept=".pdf" multiple name="" id="" />
      </div>
      <br />
      <div>
        <label for="">Upload Profile</label>
        <input type="file" accept="image/*" name="" id="" />
      </div>
      <br />
      <div>
        <label for="">Upload Video</label>
        <input type="file" accept="video/*" name="" id="" />
      </div>
      <br />
      <div>
        <label for="">Upload Song</label>
        <input type="file" accept="audio/*" name="" id="" />
      </div>
      <div>
        <button>Upload</button>
      </div>
    </form>
  </body>
</html>
