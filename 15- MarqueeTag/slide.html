<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marquee Tag = slide behaviour</h1>
    <marquee
      behavior="slide"
      direction="left"
      bgcolor="tomato"
      scrollamount="20"
    >
      <h1>
        This text is moving from right to left and it will stop at the extreme
        right side
      </h1>
    </marquee>
  </body>
</html>
