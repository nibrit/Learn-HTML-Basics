<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Marquee Tag in HTML</h1>
    <marquee behavior="scroll" direction="left" bgcolor="hotpink">
      <h2>🚀Text is moving from right to left side🚀</h2>
    </marquee>
    
    <marquee behavior="scroll" direction="right" scrollamount="60">
      <img
        src="https://a-z-animals.com/media/2021/09/Whippet.jpg"
        alt=""
        width="200"
        height=""
      />
    </marquee>
    <marquee
      behavior="scroll"
      direction="up"
      bgcolor="yellow"
      height="300"
      width="600"
    >
      <h1>Text is moving from bottom to top</h1>
    </marquee>
  </body>
</html>
