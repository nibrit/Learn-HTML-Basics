<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>hspace and vspace in marquee tag</h1>
    <marquee
      behavior="scroll"
      direction="left"
      bgcolor="skyblue"
      scrollamount="25"
      hspace="300"
    >
      <h1>Equal Space is created from left and right side</h1>
    </marquee>

    <marquee 
    behavior="scroll" 
    direction="right" 
    bgcolor="orange" 
    vspace="100">
      <h1>Equal space is created from top and bottom side</h1>
    </marquee>
  </body>
</html>
