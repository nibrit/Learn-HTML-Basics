<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0px;
        margin: 0px;
        box-sizing: border-box;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }
      header {
        width: 100%;
        height: 80px;
        background-color: black;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header > aside {
        width: 25%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
      }
      aside > span:first-child {
        color: white;
        font-size: 25px;
        font-weight: 600;
      }
      aside > span:last-child {
        color: orange;
        font-size: 25px;
        font-weight: 600;
      }

      header > nav {
        width: 50%;
        height: 100%;
        display: flex;
        align-items: center;
      }
      header > nav > ul {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
      }
      ul li {
        padding: 10px 15px;
        color: orange;
        font-size: 20px;
        border-radius: 3px;
      }
      li:hover {
        background-color: orange;
        color: white;
      }
    </style>
  </head>
  <body>
    <header>
      <aside>
        <span>My</span>
        <span>Website</span>
      </aside>
      <nav>
        <ul type="none">
          <li>Home</li>
          <li>Services</li>
          <li>About Us</li>
          <li>Contact Us</li>
          <li>Login</li>
        </ul>
      </nav>
    </header>
  </body>
</html>
