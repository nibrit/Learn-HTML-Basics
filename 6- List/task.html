  <body>
    <h1>4. Nested List</h1>
    <ol>
      <li>
        <strong> <em>Java Full-Stack Course</em></strong>
        <ul type="disc">
          <li>Java</li>
          <li>J2EE</li>
          <li>Web tech</li>
          <li>SQL</li>
        </ul>
      </li>

      <li>
        <strong>
          <em>Python Full-Stack Course</em>
        </strong>
        <ul>
          <li>Python</li>
          <li>Django</li>
          <li>Web Tech</li>
          <li>SQL</li>
        </ul>
      </li>

      <li>
        <strong>
          <em>Software Testing Course</em>
        </strong>
        <ul type="square">
          <li>Manual testing</li>
          <li>Automation testing</li>
          <li>SQL</li>
          <li>Java / Python</li>
        </ul>
      </li>
    </ol>
